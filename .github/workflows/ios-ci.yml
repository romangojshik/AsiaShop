name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Ensure iOS Simulator runtime exists
        run: |
          xcodebuild -downloadPlatform iOS || true
          xcrun simctl list runtimes
          xcrun simctl list devicetypes

      - name: Create and boot simulator
        run: |
          RUNTIME_ID=$(xcrun simctl list runtimes | awk '/^iOS / {print $NF; exit}')
          DEVICE_TYPE_ID=$(xcrun simctl list devicetypes | sed -nE 's/^[[:space:]]*iPhone 17 Pro \(([^)]+)\).*/\1/p' | head -n1)

          if [ -z "$DEVICE_TYPE_ID" ]; then
            DEVICE_TYPE_ID=$(xcrun simctl list devicetypes | sed -nE 's/^[[:space:]]*iPhone[^()]* \(([^)]+)\).*/\1/p' | head -n1)
          fi

          if [ -z "$RUNTIME_ID" ] || [ -z "$DEVICE_TYPE_ID" ]; then
            echo "No iOS runtime or iPhone device type found"
            exit 1
          fi

          SIM_ID=$(xcrun simctl create "CI-iPhone" "$DEVICE_TYPE_ID" "$RUNTIME_ID")
          echo "SIM_ID=$SIM_ID" >> "$GITHUB_ENV"

          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b

      - name: Build and test
        run: |
          xcodebuild \
            -project AsiaShop.xcodeproj \
            -scheme AsiaShop \
            -destination "id=$SIM_ID" \
            clean test
