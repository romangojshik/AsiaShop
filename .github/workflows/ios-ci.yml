name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test
        run: |
          xcodebuild \
            -project AsiaShop.xcodeproj \
            -scheme AsiaShop \
            -destination "platform=macOS,variant=Designed for [iPad,iPhone]" \
            clean test
