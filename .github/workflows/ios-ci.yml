name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Create iPhone 17 Pro simulator
        run: |
          xcodebuild -downloadPlatform iOS || true
          SIM_ID=$(xcrun simctl create "CI-iPhone-17-Pro" "iPhone 17 Pro" "com.apple.CoreSimulator.SimRuntime.iOS-26-1")
          echo "SIM_ID=$SIM_ID" >> "$GITHUB_ENV"
          xcrun simctl boot "$SIM_ID"
          xcrun simctl bootstatus "$SIM_ID" -b

      - name: Build and test
        run: |
          xcodebuild \
            -project AsiaShop.xcodeproj \
            -scheme AsiaShop \
            -destination "id=$SIM_ID" \
            clean test
